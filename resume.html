  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />

  <!-- Print styles -->
  <style>
    @media print {
      .site-header,
      .site-footer,
      .skip-link,
      .resume-controls,
      .resume-lang,
      .resume-pdf-btn,
      .nav-toggle { display: none !important; }

      .site-main { padding-top: 0; }

      .resume-layout {
        grid-template-columns: 180px 1fr;
        gap: 1.5rem;
      }

      .resume-sidebar { position: static; }

      .resume-section__title {
        font-size: 1.1rem;
        margin-top: 0.75rem;
      }

      .resume-timeline__item { gap: 0.75rem; }

      body { font-size: 11pt; }

      a[href]::after { content: none; }
    }
  </style>

<body data-page="resume">
  <a href="#main-content" class="skip-link">Skip to content</a>

  <header class="site-header" role="banner">
    <div class="container container--wide">
      <a href="index.html" class="site-logo">Bruno Ramos Martins</a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
      <nav id="site-nav" class="site-nav" role="navigation" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>

        <h1>Resume</h1>
        <div class="resume-controls">
          <div class="resume-lang" role="group" aria-label="Resume language">
            <button type="button" class="tag tag--active resume-lang-btn" data-lang="en" id="resume-lang-en" aria-pressed="true" title="English" aria-label="Show resume in English">EN</button>
            <button type="button" class="tag resume-lang-btn" data-lang="pt" id="resume-lang-pt" aria-pressed="false" title="Português (Brasil)" aria-label="Mostrar currículo em português (Brasil)">PT-BR</button>
          </div>
          <button type="button" class="tag resume-pdf-btn" id="resume-pdf" title="Opens the print dialog — choose Save as PDF to download" aria-label="Save resume as PDF">
            PDF
          </button>
        </div>
      </header>

      <!-- Injected by main.js → resumeRenderer.js -->
      <div id="resume-container" aria-live="polite"></div>

    </div>

  <footer class="site-footer" role="contentinfo">
