<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{article_description}}" />
  <title>{{article_title}} — TIL — Bruno Ramos Martins</title>

  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />

  <meta property="og:type"        content="article" />
  <meta property="og:title"       content="{{article_title}} — TIL — Bruno Ramos Martins" />
  <meta property="og:description" content="{{article_description}}" />
  <meta property="og:url"         content="https://brunoramosmartins.github.io/til/{{article_id}}.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />

  <script>
    MathJax = {
      tex: {
        inlineMath:  [['$', '$']],
        displayMath: [['$$', '$$']],
      },
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/highlight.css" />

  <style>
    .til-prose {
      max-width: var(--container-max);
      margin: 0 auto;
    }

    .til-prose h2 {
      font-size: var(--text-2xl);
      font-weight: var(--weight-semibold);
      letter-spacing: -0.01em;
      margin-top: var(--space-10);
      margin-bottom: var(--space-3);
    }

    .til-prose h3 {
      font-size: var(--text-xl);
      font-weight: var(--weight-medium);
      margin-top: var(--space-8);
      margin-bottom: var(--space-2);
    }

    .til-prose p {
      font-size: var(--text-base);
      line-height: var(--leading-relaxed);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-4);
    }

    .til-prose ul,
    .til-prose ol {
      list-style: revert;
      padding-left: var(--space-6);
      margin-bottom: var(--space-4);
      color: var(--color-text-secondary);
      line-height: var(--leading-relaxed);
    }

    .til-prose li { margin-bottom: var(--space-2); }

    .til-prose img {
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      margin: var(--space-6) 0;
    }

    .til-header {
      padding: var(--space-12) 0 var(--space-8);
      border-bottom: 1px solid var(--color-border);
      margin-bottom: var(--space-10);
      max-width: var(--container-max);
      margin-left: auto;
      margin-right: auto;
    }

    .til-header__back {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      display: inline-block;
      margin-bottom: var(--space-4);
      transition: color var(--transition-fast);
    }
    .til-header__back:hover { color: var(--color-accent); }

    .til-header__kicker {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-accent);
      margin-bottom: var(--space-2);
    }

    .til-header__title {
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      letter-spacing: -0.02em;
      line-height: var(--leading-tight);
      margin-bottom: var(--space-3);
    }

    .til-header__meta {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .til-header__date {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <header class="site-header" role="banner">
    <div class="container container--wide">
      <a href="../index.html" class="site-logo">Bruno Ramos Martins</a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
      <nav id="site-nav" class="site-nav" role="navigation" aria-label="Main navigation">
        <a href="../index.html">Home</a>
        <a href="../projects.html">Projects</a>
        <a href="../articles.html">Articles</a>
        <a href="../til.html" class="active" aria-current="page">TIL</a>
        <a href="../resume.html">Resume</a>
        <a href="../about.html">About</a>
      </nav>
    </div>
  </header>

  <main class="site-main" id="main-content">
    <div class="container container--wide">

      <header class="til-header">
        <a href="../til.html" class="til-header__back">← TIL</a>
        <p class="til-header__kicker">Today I Learned</p>
        <h1 class="til-header__title">{{article_title}}</h1>
        <div class="til-header__meta">
          <time class="til-header__date" datetime="{{article_date_iso}}">{{article_date}}</time>
          <div class="tags">
            {{article_tags}}
          </div>
        </div>
      </header>

      <article class="til-prose" aria-label="TIL content">
        {{article_content}}
        {{cross_link_box}}
      </article>

    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container container--wide">
      <span class="footer-copy">© 2026 Bruno Ramos Martins</span>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="https://github.com/brunoramosmartins" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://www.linkedin.com/in/bruno-ramos-martins-22a6a61a0/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="../about.html">About</a>
      </nav>
    </div>
  </footer>

  <script src="../assets/js/navigation.js" defer></script>

</body>
</html>
