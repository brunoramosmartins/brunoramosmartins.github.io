  <link rel="stylesheet" href="assets/css/layout.css" />

<body data-page="projects">

  <header class="site-header" role="banner">
    <div class="container container--wide">
      <a href="index.html" class="site-logo">Bruno Ramos Martins</a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
      <nav id="site-nav" class="site-nav" role="navigation" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="projects.html" class="active" aria-current="page">Projects</a>
        <a href="articles.html">Articles</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <main class="site-main" id="main-content">
    <div class="container container--wide">

      <header class="page-title">
        <h1>Projects</h1>
        <p>Machine learning and data science engineering work, documented
           with reproducibility and clarity in mind.</p>
      </header>

      <!-- Filter bar — data-filter values must match tag/stack values in projects.json -->
      <div id="projects-filter" class="tags" style="margin-bottom: var(--space-10);" aria-label="Filter projects by topic">
        <button class="tag tag--active" data-filter="all"              type="button">All</button>
        <button class="tag"             data-filter="machine-learning" type="button">Machine Learning</button>
        <button class="tag"             data-filter="nlp"              type="button">NLP</button>
        <button class="tag"             data-filter="deep-learning"    type="button">Deep Learning</button>
        <button class="tag"             data-filter="data"             type="button">Data</button>
        <button class="tag"             data-filter="python"           type="button">Python</button>
      </div>

      <!-- Injected by main.js → projectRenderer.js -->
      <div class="grid-cards grid-cards--2col" id="projects-grid" aria-live="polite"></div>

    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container container--wide">
      <span class="footer-copy">© 2025 Bruno Ramos Martins</span>

        <a href="about.html">About</a>

    </div>
